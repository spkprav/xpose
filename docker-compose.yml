services:
  postgres:
    image: postgres:16-alpine
    container_name: xpose-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PGDATABASE:-xpose}
      POSTGRES_USER: ${PGUSER:-postgres}
      POSTGRES_PASSWORD: ${PGPASSWORD:-postgres}
    ports:
      - "${PGPORT:-54329}:5432"
    volumes:
      - xpose_pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/00-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-postgres} -d ${PGDATABASE:-xpose}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  xpose_pgdata:
    name: xpose_pgdata
